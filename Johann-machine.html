<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPTecher's Machine</title>
    
    <link rel="stylesheet" href="style.css">
</head>


<body bgcolor="#0e0534">
  <div style="color:white">
    
        <h1>Johann's Machine</h1>
  
</div>
<div style="color:white" class="titulo">
        <h3 oninput="octal()">Digite um número decimal:</h3>
        <input id="demo1" type="text" placeholder="Ex: 42">
</div>


        <h3 style="color:white">Resultados:</h3>
<div style="color:white">
        <p>Octal:
        <div id="demo2"></div>
        </p>
        <p>Hexadecimal:
        <div id="demo3" oninput="hexa()"></div>
        </p>
        <p>Binário:
        <div id="demo4" oninput="bin()"></div>
        </p>
</div>


    <script>
    
        function tentar(){
          var decimal = Number(demo1.value);
          demo2.innerHTML = decimal.toString(8);
          demo3.innerHTML = decimal.toString(16);
          demo4.innerHTML = decimal.toString(2);
        }
    </script>
</body>

</html>
